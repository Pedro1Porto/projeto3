<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29/04</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top p-4">
        <div class="container">
            <h1 class="navbar-brand m-0">Nome do Restaurante</h1>

            <!--menu hamburguer-->
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu-navegacao"> <!--target para se referenciar ao nav(foi declarada a ID lá inclusive)--> <!--toggle=collapse para ativar a ação no botão de contrair e aparecer-->
                <span class="navbar-toggler-icon"></span>
            </button>

            <nav class="navbar-collapse collapse justify-content-end" id="menu-navegacao"> <!--animação de contrair e aparecer-->
                <ul class="nav nav-pills d-block d-md-flex"> <!--d-block para desaparecerem no mobile--> <!--d-md-flex para que a partir da versao medium (tablet), terá o display flex -->
                    <li class="nav-item">
                        <a class="nav-link active fw-bold" href="#">
                            <i class="bi bi-house-door me-1"></i>
                            Sobre o Restaurante
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">
                            <i class="bi bi-calendar-check me-1"></i>
                            Eventos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">
                            <i class="bi bi-card-text me-1"></i>
                            Nosso Cardápio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">
                            <i class="bi bi-chat-left-text me-1"></i>
                            Fale Conosco
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</html>
